name: Build and Commit Addon Zip

on:
  push:
    branches: ["**"]
    paths:
      - "**.py"
      - ".github/workflows/build-zip.yml"

concurrency:
  group: build-zip-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build addon zip
        run: python build.py

      - name: Commit and push zip
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage only the versioned zip files so we don't accidentally commit other things
          git add fallout4_tutorial_helper-v*.zip
          # Only commit if there is something new/changed
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild addon zip [skip ci]"
            git push
          else
            echo "Zip is already up-to-date, nothing to commit."
          fi
