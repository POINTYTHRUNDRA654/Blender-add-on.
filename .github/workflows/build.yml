name: Build Add-on Zips

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  # Rebuild on every push to any branch when source files change.
  # This means fresh zips are available as artifacts after every push —
  # not only when code lands on main.
  push:
    paths:
      - "**.py"
      - "blender_manifest.toml"
      - "build_addon.py"
      - ".github/workflows/build.yml"

  # Also build on pull requests so reviewers can download and test zips
  # directly from the PR's Checks / Actions tab.
  pull_request:
    paths:
      - "**.py"
      - "blender_manifest.toml"
      - "build_addon.py"
      - ".github/workflows/build.yml"

  # Also allow a manual trigger from the Actions tab
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Permissions – read-only; zips are no longer committed back to the repo
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read

jobs:
  build:
    name: Build all Blender version zips
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Run the build script ────────────────────────────────────────────
      - name: Build zips (all Blender variants)
        run: python3 build_addon.py --outdir .

      # ── 3. Run the integrity tests to catch regressions ───────────────────
      - name: Run addon integrity tests
        run: python3 test_addon_integrity.py

      # ── 4. Upload as workflow artifacts (download from the Actions tab) ────
      - name: Upload zips as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fallout4-addon-zips
          path: blender_game_tools-v*-blender*.zip
          retention-days: 90
