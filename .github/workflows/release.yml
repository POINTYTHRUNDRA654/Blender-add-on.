name: Build and Release Add-on ZIP

on:
  push:
    # Run on every branch push so the zip is always rebuilt when code changes.
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    # Build on PRs to verify the zip can be produced before merging.
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the full branch so the auto-commit step can push back.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build add-on ZIP
        # build.py removes any old zip first, rebuilds from scratch, and appends
        # a timestamped entry to build.log so there is always an audit trail.
        run: python build.py

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-zip
          path: fallout4_tutorial_helper-v*.zip

      - name: Commit rebuilt ZIP back to branch
        # Only run on direct pushes (not on PRs or tag events) so the repo
        # always contains an up-to-date installable zip.  The [skip ci] marker
        # prevents the commit from re-triggering this workflow.
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Remove any stale old-version zips that are still tracked in git,
          # so there is always exactly one zip in the repo.  --ignore-unmatch
          # makes this a no-op when no old zips exist.
          git rm --cached --ignore-unmatch 'fallout4_tutorial_helper-v*.zip'
          ZIP=$(ls fallout4_tutorial_helper-v*.zip | head -1)
          git add "$ZIP" build.log
          git diff --staged --quiet && echo "No zip changes to commit." && exit 0
          git commit -m "ci: rebuild addon zip for ${{ github.sha }} [skip ci]"
          # Retry up to 3 times with a rebase to handle concurrent pushes.
          n=0
          until [ $n -ge 3 ]; do
            git push && break
            n=$((n+1))
            echo "Push attempt $n failed, rebasing and retrying..."
            git pull --rebase origin ${{ github.ref_name }}
          done

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: fallout4_tutorial_helper-v*.zip
          body: |
            ## Installation

            Download `fallout4_tutorial_helper-v*.zip` from the assets below.

            In Blender: **Edit → Preferences → Add-ons → Install…**, select the zip,
            then enable **"Fallout 4 Tutorial Helper"**.

            > **Do not** install the raw GitHub source ZIP — it contains a folder named
            > `Blender-add-on.` which is not a valid Python package name and will cause
            > `No module named 'Blender-add-on'` errors.
