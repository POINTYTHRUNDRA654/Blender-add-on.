schema_version = "1.0.0"

# The 'id' field becomes the Python module name that Blender uses to import
# this add-on.  It MUST be a valid Python identifier (letters, digits, and
# underscores only — no hyphens or periods).  This is the authoritative fix
# for "No module named 'Blender-add-on'" errors that occur when users install
# directly from the GitHub source download whose folder is named
# 'Blender-add-on.' (an illegal Python identifier).
id = "fallout4_tutorial_helper"
version = "2.3.0"
name = "Fallout 4 Mod Assistant"
tagline = "Professional Fallout 4 modding assistant with correct NIF export settings for Niftools v0.1.1"
maintainer = "Tutorial Team"
type = "add-on"

# The add‑on supports Blender 2.90+ through 5.x.  The minimum is set to
# 2.90.0 because that is when merge_by_distance (formerly remove_doubles)
# was introduced, which the add‑on relies on for mesh optimisation.
# NOTE: NIF export via Niftools v0.1.1 requires Blender 3.6 LTS.
blender_version_min = "2.90.0"

license = ["SPDX:MIT"]

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "*.pyc",
  ".git/",
  ".github/",
  "*.zip",
]
